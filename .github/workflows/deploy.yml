name: Build and deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: megamall-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      FRONTEND_DIR: megamall-crm/web-admin
      BACKEND_DIR: megamall-crm
      SERVER_USER: deploy
      # internal/media (image pipeline) uses bimg/libvips via CGO. The
      # production host is also ubuntu-latest-equivalent (24.04, amd64),
      # so this is a native, non-cross-compiled build — see the CI
      # requirements section of megamall-audits/media-pipeline-phase1-*
      # for the libvips runtime package list the production host needs.
      CGO_ENABLED: 1

    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: megamall-crm/web-admin/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: megamall-crm/go.mod
          cache-dependency-path: megamall-crm/go.sum

      - name: Install libvips (internal/media image pipeline, CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Verify CI test-isolation contract (deploy.yml must never need a database)
        run: bash scripts/verify-deploy-test-isolation.sh

      - name: Compile all backend packages
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test -run '^$' ./...

      - name: Run database-independent backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          go test \
            ./internal/compensation \
            ./internal/finance \
            ./internal/inventory \
            ./internal/payouts \
            ./internal/seed \
            ./internal/uploads \
            ./pkg/middleware

      # internal/courier's dto_test.go is DB-independent (pure request
      # validation), but media_integration_test.go (cash-handover proofs,
      # Phase 1 media pipeline) needs a real Postgres via TEST_ADMIN_DSN,
      # same as internal/products' and internal/users' equivalents below —
      # so, like those, it isn't run in this workflow; only the -run filter
      # below is.
      - name: Run courier no-DB tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/courier -run 'TestSubmitHandoverRequest'

      # internal/users' rbac_test.go and service_test.go are DB-independent
      # (rbac_test.go is a pure unit test; service_test.go's own newTestDB
      # helper skips gracefully when DB_DSN is unset, which it always is
      # here). media_integration_test.go (Phase 1 media pipeline: avatars,
      # HR/passport documents) needs TEST_ADMIN_DSN's disposable Postgres,
      # so — like internal/products' and internal/courier's equivalents —
      # it isn't run in this workflow; only the -run filter below is.
      - name: Run users no-DB tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/users -run 'TestUpdateUserRBAC|TestUsers_'

      - name: Run media pipeline unit tests (no DB required)
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/media/... -run 'TestValidate|TestSignedURL|TestNewSignedURLQuery|TestSafeStorageKey|TestNewStorageKey|TestVariantStorageKey|TestLooksLike|TestBaseContentType|TestBuildExifJPEG|TestProcess|TestWriteAtomic|TestRegisterRoutes|TestAuthorize' -timeout 5m

      - name: Run media config tests (MEDIA_PIPELINE_ENABLED production-safety contract)
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./config/... -v -run TestLoad_Media

      # internal/products' dto_test.go is DB-independent (pure request
      # validation), but media_integration_test.go and handler_media_test.go
      # (Phase 2: product images) need a real Postgres via DB_DSN, same as
      # internal/media's own repository/service/handler tests — so, like
      # those, they aren't run in CI; only the -run filter below is.
      - name: Run products no-DB tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/products/... -run 'TestCreateProductRequest|TestUpdateProductRequest'

      - name: Test deployment and rollback logic
        run: bash scripts/test-deploy.sh

      - name: Build Linux backend
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-w -s" -o ../release/megamall-crm ./cmd/server

      - name: Package immutable release
        run: |
          set -Eeuo pipefail
          mkdir -p release/frontend
          cp -a "$FRONTEND_DIR/dist/." release/frontend/
          printf '%s\n' "$GITHUB_SHA" > release/REVISION
          tar -C release -czf "megamall-$GITHUB_SHA.tar.gz" .
          bash -n deploy.sh

      - name: Configure verified SSH access
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          umask 077
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SERVER_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s %s\n' "$SERVER_HOST" \
            'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOyShTb8NPuH+bPPBFOjV0e/8PI+Tg0pXPbq/V3dlUmq' \
            > "$HOME/.ssh/known_hosts"

      - name: Upload release artifact
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -Eeuo pipefail
          SSH_ARGS=(-i "$HOME/.ssh/deploy_key" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          scp "${SSH_ARGS[@]}" "megamall-$GITHUB_SHA.tar.gz" \
            "$SERVER_USER@$SERVER_HOST:/tmp/"

      - name: Deploy with automatic rollback
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -Eeuo pipefail
          SSH_ARGS=(-i "$HOME/.ssh/deploy_key" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          ssh "${SSH_ARGS[@]}" "$SERVER_USER@$SERVER_HOST" \
            "sudo --non-interactive /var/www/megamall-crm/deploy.sh '$GITHUB_SHA' '/tmp/megamall-$GITHUB_SHA.tar.gz'"

      - name: Verify public application path
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            --max-time 10 "https://$SERVER_HOST/api/v1/ready" >/dev/null
