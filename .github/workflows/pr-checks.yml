name: PR checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FRONTEND_DIR: megamall-crm/web-admin
      BACKEND_DIR: megamall-crm
      # internal/media (image pipeline) uses bimg/libvips via CGO — every
      # Go step in this job needs the C toolchain + libvips headers, not
      # just the build step, since `go vet`/`go test` also compile.
      CGO_ENABLED: 1
      # Admin connection for the disposable-database test harness
      # (pkg/dbsafety, internal/testutil) — points ONLY at the ephemeral
      # `postgres` service container below, never at anything shared or
      # long-lived. Every DB-backed test creates and drops its own unique
      # database + role through this connection; see pkg/dbsafety's doc
      # comment for why this is a hard requirement, not a convenience.
      TEST_ADMIN_DSN: "host=localhost port=5432 user=ci_disposable_admin password=ci_disposable_admin dbname=postgres sslmode=disable"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_disposable_admin
          POSTGRES_PASSWORD: ci_disposable_admin
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_disposable_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out the PR revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify CI test-isolation contract (deploy.yml must never need a database)
        run: bash scripts/verify-deploy-test-isolation.sh

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: megamall-crm/web-admin/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: megamall-crm/go.mod
          cache-dependency-path: megamall-crm/go.sum

      - name: Install libvips (internal/media image pipeline, CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Compile all backend packages
        working-directory: ${{ env.BACKEND_DIR }}
        run: go build ./...

      - name: Vet all backend packages
        working-directory: ${{ env.BACKEND_DIR }}
        run: go vet ./...

      - name: Run users module tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/users/...

      - name: Run media pipeline unit tests (no DB required)
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/media/... -run 'TestValidate|TestSignedURL|TestNewSignedURLQuery|TestSafeStorageKey|TestNewStorageKey|TestVariantStorageKey|TestLooksLike|TestBaseContentType|TestBuildExifJPEG|TestProcess|TestWriteAtomic|TestRegisterRoutes|TestAuthorize' -timeout 5m

      - name: Run media config tests (MEDIA_PIPELINE_ENABLED production-safety contract)
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./config/... -v -run TestLoad_Media

      - name: Run request-logger redaction tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./pkg/middleware/... -run 'TestRedactSensitiveQuery|TestRequestLogger'

      # internal/products' dto_test.go is DB-independent (pure request
      # validation); this filtered subset gives a fast signal before the
      # full DB-backed run below.
      - name: Run products no-DB tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./internal/products/... -run 'TestCreateProductRequest|TestUpdateProductRequest'

      # Proves deploy.yml's "Run courier no-DB tests" / "Run users no-DB
      # tests" steps are genuinely database-independent, not just passing
      # because TEST_ADMIN_DSN happens to be set here too: same -run
      # filters, same packages, with TEST_ADMIN_DSN explicitly cleared for
      # this one step even though the postgres service container above is
      # still running. See scripts/verify-deploy-test-isolation.sh for the
      # accompanying static check that deploy.yml never sets this var.
      - name: Verify courier/users no-DB test filters need no database
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          TEST_ADMIN_DSN: ""
        run: |
          go test ./internal/courier -run 'TestSubmitHandoverRequest' -v
          go test ./internal/users -run 'TestUpdateUserRBAC|TestUsers_' -v

      # Every package with DB-backed tests (internal/media,
      # internal/products' media integration tests, and the rest listed in
      # internal/testutil's doc comment) provisions its own disposable
      # database + role against the postgres service container above via
      # TEST_ADMIN_DSN, through pkg/dbsafety + internal/testutil — never
      # against anything shared. This is the first time these tests run in
      # CI at all; previously they were entirely filtered out above for
      # lack of a database to run against.
      - name: Run full test suite (disposable DB via TEST_ADMIN_DSN)
        working-directory: ${{ env.BACKEND_DIR }}
        run: go test ./... -timeout 10m
