name: Production HTTPS health

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: megamall-production-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify HTTPS certificate and readiness
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            --max-time 15 "https://$SERVER_HOST/api/v1/ready" >/dev/null
