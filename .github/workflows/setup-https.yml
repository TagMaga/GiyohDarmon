name: Set up HTTPS for giyohdarmon.tj

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diagnose (read-only, safe) or apply (installs certbot, writes nginx config, gets cert)"
        required: true
        default: diagnose
        type: choice
        options:
          - diagnose
          - apply

permissions:
  contents: read

concurrency:
  group: megamall-production-https-setup
  cancel-in-progress: false

jobs:
  setup-https:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SERVER_USER: deploy
      DOMAIN: giyohdarmon.tj
      FRONTEND_ROOT: /var/www/megamall-crm/megamall-crm/web-admin/dist
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure verified SSH access
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          umask 077
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SERVER_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s %s\n' "$SERVER_HOST" \
            'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOyShTb8NPuH+bPPBFOjV0e/8PI+Tg0pXPbq/V3dlUmq' \
            > "$HOME/.ssh/known_hosts"

      - name: Run HTTPS setup script on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          MODE: ${{ inputs.mode }}
        run: |
          set -Eeuo pipefail
          SSH_ARGS=(-i "$HOME/.ssh/deploy_key" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          ssh "${SSH_ARGS[@]}" "$SERVER_USER@$SERVER_HOST" \
            "MODE='$MODE' DOMAIN='$DOMAIN' FRONTEND_ROOT='$FRONTEND_ROOT' bash -s" \
            < scripts/setup_https_remote.sh

      - name: Verify HTTPS is live
        if: ${{ inputs.mode == 'apply' }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            --max-time 10 "https://${DOMAIN}/api/v1/ready" \
            && echo "OK: https://${DOMAIN}/api/v1/ready is reachable over HTTPS"
