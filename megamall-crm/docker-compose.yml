version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megamall_crm
      POSTGRES_USER: megamall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megamall -d megamall_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: ghcr.io/pressly/goose:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=megamall password=${POSTGRES_PASSWORD} dbname=megamall_crm sslmode=disable"
    command: ["-dir", "/migrations", "up"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: "host=postgres port=5432 user=megamall password=${POSTGRES_PASSWORD} dbname=megamall_crm sslmode=disable TimeZone=UTC"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SERVER_PORT: "8080"
      GIN_MODE: "release"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
