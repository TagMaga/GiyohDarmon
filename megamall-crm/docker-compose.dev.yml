version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megamall_crm_dev
      POSTGRES_USER: megamall
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megamall -d megamall_crm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_DSN: "host=postgres port=5432 user=megamall password=devpassword dbname=megamall_crm_dev sslmode=disable TimeZone=UTC"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "dev-access-secret-change-in-prod"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-prod"
      SERVER_PORT: "8080"
      GIN_MODE: "debug"
    volumes:
      # Mount source for hot reload.
      - .:/app
      # Preserve Go module cache across restarts.
      - go_mod_cache:/go/pkg/mod
    ports:
      - "8080:8080"

volumes:
  postgres_dev_data:
  go_mod_cache:
